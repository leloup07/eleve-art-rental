<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección Eleve — Galería Privada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ivory:#f7f4ef;--cream:#faf8f5;--parchment:#ede8df;--linen:#d9d0c1;
  --ash:#9e9890;--charcoal:#2c2a27;--ink:#1a1917;--gold:#b89a5e;
  --gold-light:#d4b87a;--rust:#8b4a2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--charcoal);font-weight:300;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5;}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:72px;background:rgba(247,244,239,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--parchment);transition:all .3s ease;}
.header.scrolled{height:60px;box-shadow:0 2px 20px rgba(0,0,0,.06);}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--ink);cursor:pointer;}
.logo span{color:var(--gold);font-weight:600;}
.nav{display:flex;gap:32px;align-items:center;}
.nav a{font-size:12px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:var(--ash);transition:color .3s;font-weight:400;}
.nav a:hover,.nav a.active{color:var(--ink);}
.nav-admin{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border:1px solid var(--linen);background:transparent;color:var(--ash);cursor:pointer;transition:all .3s;font-family:'Jost',sans-serif;}
.nav-admin:hover{border-color:var(--gold);color:var(--gold);}

/* HERO */
.hero{height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 60px;background:linear-gradient(180deg,var(--ivory) 0%,var(--cream) 100%);position:relative;}
.hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:1px;background:var(--gold);}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,60px);font-weight:300;letter-spacing:6px;text-transform:uppercase;color:var(--ink);margin-bottom:16px;}
.hero p{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--ash);font-weight:300;}
.hero .count{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--gold);font-weight:300;margin-bottom:8px;}
.search-bar{max-width:520px;margin:0 auto;padding:24px 48px 48px;position:relative;}
.search-bar input{width:100%;padding:14px 20px 14px 48px;border:1px solid var(--linen);background:var(--ivory);font-family:'Jost',sans-serif;font-size:15px;color:var(--ink);letter-spacing:1px;outline:none;transition:border .3s;}
.search-bar input::placeholder{color:var(--ash);letter-spacing:2px;font-size:13px;text-transform:uppercase;}
.search-bar input:focus{border-color:var(--gold);}
.search-bar svg{position:absolute;left:68px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--ash);pointer-events:none;}

/* SECTIONS */
.section{padding:80px 48px;position:relative;}
.section:nth-child(even){background:var(--ivory);}
.section-header{text-align:center;margin-bottom:60px;}
.section-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.5vw,42px);font-weight:300;color:var(--ink);margin-bottom:16px;}
.section-desc{font-size:14px;color:var(--ash);max-width:600px;margin:0 auto;line-height:1.8;}


/* EXHIBIT ROWS */
.exhibits{max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:0;}
.exhibit{display:grid;grid-template-columns:1fr 1fr;min-height:420px;border-bottom:1px solid var(--parchment);cursor:pointer;transition:background .5s ease;}
.exhibit:last-child{border-bottom:none;}
.exhibit:hover{background:rgba(237,232,223,.35);}
.exhibit:nth-child(even){direction:rtl;}
.exhibit:nth-child(even) > *{direction:ltr;}

/* Image side */
.exhibit-img{position:relative;display:flex;align-items:center;justify-content:center;padding:40px;overflow:hidden;background:var(--parchment);background:linear-gradient(135deg,rgba(237,232,223,.5) 0%,rgba(237,232,223,.2) 100%);}
.exhibit-img img{max-width:100%;max-height:380px;object-fit:contain;filter:drop-shadow(0 6px 24px rgba(0,0,0,.1));transition:transform .8s cubic-bezier(.25,.46,.45,.94);}
.exhibit:hover .exhibit-img img{transform:scale(1.03);}
.exhibit-badge{position:absolute;top:24px;left:24px;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;background:rgba(247,244,239,.92);backdrop-filter:blur(6px);color:var(--charcoal);border:1px solid var(--linen);}
.exhibit:nth-child(even) .exhibit-badge{left:auto;right:24px;}

/* Text side */
.exhibit-text{display:flex;flex-direction:column;justify-content:center;padding:48px 56px;}
.exhibit-num{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--linen);letter-spacing:2px;margin-bottom:16px;font-weight:300;}
.exhibit-artist{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-weight:400;}
.exhibit-title{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,2.5vw,32px);font-weight:300;color:var(--ink);margin-bottom:20px;font-style:italic;line-height:1.3;}
.exhibit-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:24px;}
.exhibit-field-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ash);margin-bottom:2px;}
.exhibit-field-value{font-size:13px;color:var(--charcoal);line-height:1.5;}
.exhibit-desc{font-size:13.5px;line-height:1.9;color:var(--ash);font-style:italic;border-top:1px solid var(--parchment);padding-top:20px;max-width:480px;}
/* FEATURED GRID */
.featured-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
.featured-card{background:var(--cream);border:1px solid var(--parchment);cursor:pointer;transition:all .4s ease;overflow:hidden;}
.featured-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.08);transform:translateY(-4px);}
.featured-card-img{aspect-ratio:4/3;overflow:hidden;background:var(--ivory);display:flex;align-items:center;justify-content:center;padding:24px;}
.featured-card-img img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .6s ease;}
.featured-card:hover .featured-card-img img{transform:scale(1.05);}
.featured-card-body{padding:20px 24px 24px;}
.featured-card-artist{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.featured-card-title{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:300;font-style:italic;color:var(--ink);margin-bottom:8px;line-height:1.3;}
.featured-card-medium{font-size:12px;color:var(--ash);line-height:1.5;}



@media(max-width:900px){
  .exhibit{grid-template-columns:1fr;min-height:auto;}
  .exhibit:nth-child(even){direction:ltr;}
  .exhibit-img{min-height:280px;padding:32px;}
  .exhibit-text{padding:32px 24px;}
  .exhibit-fields{grid-template-columns:1fr;}
}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(26,25,23,.95);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .4s ease;}
.lightbox.open{display:flex;opacity:1;}
.lb-close{position:absolute;top:24px;right:32px;font-size:28px;color:var(--linen);cursor:pointer;background:none;border:none;font-family:'Cormorant Garamond',serif;z-index:201;transition:color .3s;}
.lb-close:hover{color:var(--gold);}
.lb-content{display:flex;max-width:1200px;width:90%;max-height:85vh;gap:48px;align-items:center;}
.lb-img{flex:1;max-height:80vh;display:flex;align-items:center;justify-content:center;}
.lb-img img{max-width:100%;max-height:80vh;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.lb-details{flex:0 0 360px;color:var(--parchment);overflow-y:auto;max-height:80vh;padding-right:16px;}
.lb-details::-webkit-scrollbar{width:3px;}
.lb-details::-webkit-scrollbar-thumb{background:var(--ash);}
.lb-artist{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;margin-bottom:24px;line-height:1.3;}
.lb-field{margin-bottom:16px;}
.lb-field-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ash);margin-bottom:4px;}
.lb-field-value{font-size:14px;color:var(--parchment);line-height:1.6;}
.lb-desc{margin-top:24px;padding-top:24px;border-top:1px solid rgba(158,152,144,.3);font-size:14px;line-height:1.8;color:var(--linen);font-style:italic;}
.lb-actions{margin-top:28px;display:flex;flex-direction:column;gap:12px;}

.lb-contact{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--cream);text-decoration:none;border:1px solid var(--gold);padding:14px 24px;transition:all .3s;background:rgba(179,163,130,.15);}
.lb-contact:hover{color:white;border-color:white;background:rgba(179,163,130,.3);}

/* ADMIN PANEL */
.admin-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,25,23,.92);display:none;backdrop-filter:blur(8px);}
.admin-overlay.open{display:flex;justify-content:center;align-items:flex-start;padding-top:80px;overflow-y:auto;}
.admin-panel{background:var(--cream);max-width:800px;width:90%;padding:48px;position:relative;margin-bottom:80px;}
.admin-close{position:absolute;top:16px;right:24px;font-size:24px;background:none;border:none;cursor:pointer;color:var(--ash);font-family:'Cormorant Garamond',serif;transition:color .3s;}
.admin-close:hover{color:var(--ink);}
.admin-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:8px;}
.admin-subtitle{font-size:12px;color:var(--ash);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.admin-section{margin-bottom:32px;}
.admin-section-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--parchment);}
.admin-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--parchment);}
.admin-row-info{flex:1;}
.admin-row-artist{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ash);}
.admin-row-title{font-size:14px;color:var(--ink);font-style:italic;}
.admin-toggles{display:flex;gap:16px;align-items:center;}
.admin-toggle-group{display:flex;align-items:center;gap:6px;}
.admin-toggle-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ash);}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--linen);cursor:pointer;position:relative;transition:background .3s;}
.toggle.on{background:var(--gold);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:white;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(16px);}
.admin-export{margin-top:24px;padding:12px 24px;background:var(--ink);color:var(--parchment);border:none;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.admin-export:hover{background:var(--charcoal);}

/* FOOTER */
.footer{padding:60px 48px;text-align:center;border-top:1px solid var(--parchment);background:var(--ivory);}
.footer-email{font-size:13px;color:var(--ash);letter-spacing:2px;margin-bottom:12px;}
.footer-email a{color:var(--gold);text-decoration:none;transition:color .3s;}
.footer-email a:hover{color:var(--rust);}
.footer p{font-size:12px;color:var(--ash);letter-spacing:2px;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.anim{opacity:0;transform:translateY(24px);transition:all .7s cubic-bezier(.25,.46,.45,.94);}
.anim.visible{opacity:1;transform:translateY(0);}

/* RESPONSIVE */
@media(max-width:900px){
  .header{padding:0 24px;}
  .nav{gap:16px;}
  .search-bar{padding:16px 24px 32px;}
  .search-bar svg{left:44px;}
  .section{padding:60px 24px;}
  .lb-content{flex-direction:column;gap:24px;}
  .lb-details{flex:none;width:100%;}
  .lb-img img{max-height:50vh;}
  .hero{height:auto;padding:120px 24px 80px;}
}
@media(max-width:600px){
  .header{padding:0 16px;}
  .nav a{font-size:10px;letter-spacing:1px;}
  .hero h1{letter-spacing:3px;}
  .admin-panel{padding:24px;}
  .admin-toggles{flex-direction:column;gap:8px;align-items:flex-end;}
  .exhibit-text{padding:24px 20px;}
  .exhibit-fields{grid-template-columns:1fr;}
}
</style>
</head>

</div>

<!-- MAIN CONTENT -->
<div id="main"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">

</div>

<!-- ADMIN OVERLAY -->

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-email">Contacto: <a href="mailto:eleve.art@outlook.com">eleve.art@outlook.com</a></div>
  <p>Colección Eleve · Galería Privada · Todos los derechos reservados</p>
</div>

const SECTIONS = {
  iconic: {
    label: "Sección I",
    title: "Piezas Icónicas",
    desc: "Obras originales de los maestros: óleos, pinturas y grabados de autoría singular. Piezas con certificación y procedencia documentada.",
    bg: "var(--cream)"
  },
  graphic: {
    label: "Sección II",
    title: "Obra Gráfica",
    desc: "Grabados, aguafuertes y ediciones limitadas de artistas consagrados. Obra múltiple de alta calidad con certificados de autenticidad.",
    bg: "var(--ivory)"
  }
};

const CONTACT_EMAIL = "eleve.art@outlook.com";

let adminState = {};
try {
  const saved = localStorage.getItem('eleve-admin');
  if (saved) adminState = JSON.parse(saved);
} catch(e) {}

COLLECTION.forEach(item => {
  if (!adminState[item.id]) {
    adminState[item.id] = { visible: true, artsy: item.section === 'iconic' };
  }
});

function saveAdmin() {
  try { localStorage.setItem('eleve-admin', JSON.stringify(adminState)); } catch(e) {}
}

let searchTerm = '';

function filterGallery(term) {
  searchTerm = term.toLowerCase().trim();
  renderGallery();
}

function renderGallery() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  
  ['iconic', 'graphic'].forEach(sectionKey => {
    const sec = SECTIONS[sectionKey];
    const items = COLLECTION.filter(c => {
      if (c.section !== sectionKey) return false;
      if (adminState[c.id]?.visible === false) return false;
      if (searchTerm) {
        const haystack = [c.artist, c.title, c.medium, c.style, c.year, c.description].join(' ').toLowerCase();
        if (!haystack.includes(searchTerm)) return false;
      }
      return true;
    });
    if (items.length === 0) return;
    
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'section-' + sectionKey;
    
    const arrowSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;
    
    div.innerHTML = `
      <div class="section-header anim">
        <div class="section-label">${sec.label}</div>
        <div class="section-title">${sec.title}</div>
        <div class="section-desc">${sec.desc}</div>

      </div>
      <div class="featured-grid">
        ${items.map(item => {
          return `
          <div class="featured-card anim" onclick="openLightbox('${item.id}')">
            <div class="featured-card-img">
              <img src="${IMG[item.id] || ''}" alt="${item.artist} - ${item.title}" loading="lazy">
            </div>
            <div class="featured-card-body">
              <div class="featured-card-artist">${item.artist}</div>
              <div class="featured-card-title">${item.title}</div>
              <div class="featured-card-medium">${item.medium}${item.year && item.year !== '—' ? ' · ' + item.year : ''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
    main.appendChild(div);
  });
  
  initAnimations();
}

function openLightbox(id) {
  const item = COLLECTION.find(c => c.id === id);
  if (!item) return;
  const sec = SECTIONS[item.section];
  const lb = document.getElementById('lightbox');
  
  lb.querySelector('.lb-img img').src = IMG[id] || '';
  lb.querySelector('.lb-artist').textContent = item.artist;
  lb.querySelector('.lb-title').textContent = item.title;
  
  const fields = lb.querySelector('.lb-fields');
  fields.innerHTML = '';
  const data = [
    ['Año', item.year],
    ['Técnica', item.medium],
    ['Dimensiones', item.dimensions],
    ['Estilo', item.style],
    ['Edición', item.edition]
  ];
  data.forEach(([label, value]) => {
    if (value && value !== '—') {
      fields.innerHTML += `<div class="lb-field"><div class="lb-field-label">${label}</div><div class="lb-field-value">${value}</div></div>`;
    }
  });
  
  lb.querySelector('.lb-desc').textContent = item.description;
  
  
  const contactLink = lb.querySelector('.lb-contact');
  contactLink.href = `mailto:${CONTACT_EMAIL}?subject=Consulta: ${item.artist} - ${item.title}&body=Estimado equipo de Colección Eleve,%0A%0AMe interesa la obra "${item.title}" de ${item.artist} (${item.year}).%0A%0AQuedo a la espera de su respuesta.%0A%0AUn saludo.`;
  
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function openAdmin() {
  renderAdmin();
  document.getElementById('admin').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAdmin() {
  document.getElementById('admin').classList.remove('open');
  document.body.style.overflow = '';
  renderGallery();
}

function renderAdmin() {
  const container = document.getElementById('admin-content');
  container.innerHTML = '';
  
  ['iconic', 'graphic'].forEach(sectionKey => {
    const sec = SECTIONS[sectionKey];
    const items = COLLECTION.filter(c => c.section === sectionKey);
    
    let html = `<div class="admin-section">
      <div class="admin-section-title">${sec.title} (${items.length})</div>`;
    
    items.forEach(item => {
      const state = adminState[item.id];
      html += `
        <div class="admin-row">
          <div class="admin-row-info">
            <div class="admin-row-artist">${item.artist}</div>
            <div class="admin-row-title">${item.title}</div>
          </div>
          <div class="admin-toggles">
            <div class="admin-toggle-group">
              <span class="admin-toggle-label">Visible</span>
              <div class="toggle ${state.visible ? 'on' : ''}" onclick="toggleAdmin('${item.id}','visible',this)"></div>
            </div>
            <div class="admin-toggle-group">
              <span class="admin-toggle-label">Artsy</span>
              <div class="toggle ${state.artsy ? 'on' : ''}" onclick="toggleAdmin('${item.id}','artsy',this)"></div>
            </div>

          </div>
        </div>`;
    });
    
    html += '</div>';
    container.innerHTML += html;
  });
}

function toggleAdmin(id, prop, el) {
  adminState[id][prop] = !adminState[id][prop];
  el.classList.toggle('on');
  saveAdmin();
}

function exportData() {
  const data = COLLECTION.map(item => ({
    ...item,
    admin: adminState[item.id]
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'coleccion-eleve-export.json';
  a.click(); URL.revokeObjectURL(url);
}

function initAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  
  document.querySelectorAll('.anim').forEach(el => observer.observe(el));
}

// Header scroll
window.addEventListener('scroll', () => {
  const header = document.querySelector('.header');
  if (header) {
    header.classList.toggle('scrolled', window.scrollY > 50);
  }
});

// Active nav on scroll
window.addEventListener('scroll', () => {
  const links = document.querySelectorAll('.nav a[href^="#"]');
  const sections = document.querySelectorAll('.section[id]');
  let current = '';
  sections.forEach(sec => {
    if (window.scrollY >= sec.offsetTop - 120) current = sec.id;
  });
  links.forEach(link => {
    link.classList.toggle('active', link.getAttribute('href') === '#' + current);
  });
});

// Escape key closes overlays
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeAdmin(); }
});

// Init
renderGallery();
</script>
